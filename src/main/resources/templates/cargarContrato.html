<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" th:href="@{/css/estilos.css}"/>
  <title>Nuevo Contrato - HogarYA</title>
</head>

<body>
<div class="container">

    <header class="page-header">
        <h1>Cargar contrato</h1>
    </header>

    <!-- Mensaje de error de negocio (viene del controller cuando el servicio rechaza la operación) -->
    <div th:if="${errorGlobal}" class="alert alert-error" th:text="${errorGlobal}"></div>

    <form th:object="${contrato}" method="POST" th:action="@{/contratos/guardar}" class="formulario-card">
        <!-- th:object= Guarda toda la informacion en contrato , th:action= , -->

        <div class="form-group">
            <label>Elegir propiedad: <span class="required">*</span></label>
            <select class="form-control" th:field="*{propiedad.id}">
                <option th:each="prop : ${listaPropiedades}"
                        th:value="${prop.id}"
                        th:text="${prop.direccion}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Elegir inquilino: <span class="required">*</span></label>
            <select class="form-control" th:field="*{inquilino.id}">
                <option th:each="inq : ${listaInquilinos}"
                        th:value="${inq.id}"
                        th:text="${inq.nombre}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Elegir Fecha de inicio: <span class="required">*</span></label>
            <input type="date" class="form-control" th:field="*{fechaInicio}"/>
            <p th:if="${#fields.hasErrors('fechaInicio')}"
               th:errors="*{fechaInicio}"
               class="error"></p>
        </div>

        <div class="form-group">
            <label>Cargar la duracion en meses <span class="required">*</span></label>
            <input type="number" class="form-control" th:field="*{duracionMeses}"/>
            <p th:if="${#fields.hasErrors('duracionMeses')}"
               th:errors="*{duracionMeses}"
               class="error"></p>
        </div>

        <div class="form-group">
            <label>Cargue el importe mensual <span class="required">*</span></label>
            <input type="number" class="form-control" th:field="*{importeMensual}"/>
            <p th:if="${#fields.hasErrors('importeMensual')}"
               th:errors="*{importeMensual}"
               class="error"></p>
        </div>

        <div class="form-group">
            <label>Indique el dia de vencimiento <span class="required">*</span></label>
            <input type="number" class="form-control" th:field="*{diaVencimientoMensual}"/>
            <p th:if="${#fields.hasErrors('diaVencimientoMensual')}"
               th:errors="*{diaVencimientoMensual}"
               class="error"></p>
        </div>

        <div class="form-group">
            <label>Cargar la descripcion <span class="required">*</span></label>
            <input type="text" class="form-control" th:field="*{descripcion}"/>
            <p th:if="${#fields.hasErrors('descripcion')}"
               th:errors="*{descripcion}"
               class="error"></p>
        </div>

        <div class="form-acciones">
            <button type="submit" class="btn btn-primary">Guardar Contrato</button>
        </div>

    </form>

    <div class="page-footer">
        <a th:href="@{/}" class="btn btn-secondary">← Volver a Inicio</a>
    </div>

</div>
</body>
</html>
