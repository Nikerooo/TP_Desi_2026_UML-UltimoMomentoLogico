<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <title>Propiedades</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}"/>
</head>
<body>
<div class="container">

    <header class="page-header">
        <h1>Gestión de Propiedades</h1>
        <a th:href="@{/propiedades/nueva}" class="btn btn-primary">+ Nueva Propiedad</a>
    </header>

    <!-- Mensajes de resultado (HU 1.1 / 1.2 / 1.3) -->
    <div th:if="${mensajeExito}" class="alert alert-success" th:text="${mensajeExito}"></div>
    <div th:if="${mensajeError}" class="alert alert-error"   th:text="${mensajeError}"></div>

    <!-- Filtros HU 1.4 -->
    <section class="filtros-section">
        <h2>Filtros</h2>
        <form th:action="@{/propiedades}" method="get" class="filtros-form">
            <div class="form-row">

                <div class="form-group">
                    <label>Dirección</label>
                    <input type="text" name="direccion" class="form-control"
                           th:value="${filtroDireccion}" placeholder="Buscar por dirección..."/>
                </div>

                <div class="form-group">
                    <label>Ciudad</label>
                    <input type="text" name="ciudad" class="form-control"
                           th:value="${filtroCiudad}" placeholder="Buscar por ciudad..."/>
                </div>

                <div class="form-group">
                    <label>Tipo de propiedad</label>
                    <select name="tipo" class="form-control">
                        <option value="">-- Todos los tipos --</option>
                        <option th:each="t : ${tipos}"
                                th:value="${t.name()}"
                                th:text="${t.name()}"
                                th:selected="${filtroTipo != null and filtroTipo == t}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Estado de disponibilidad</label>
                    <select name="estado" class="form-control">
                        <option value="">-- Todos los estados --</option>
                        <option th:each="est : ${estados}"
                                th:value="${est.name()}"
                                th:text="${est.name()}"
                                th:selected="${filtroEstado != null and filtroEstado == est}">
                        </option>
                    </select>
                </div>

            </div>
            <div class="filtros-acciones">
                <button type="submit" class="btn btn-secondary">Buscar</button>
                <a th:href="@{/propiedades}" class="btn btn-link">Limpiar filtros</a>
            </div>
        </form>
    </section>

    <!-- Tabla de resultados (HU 1.4) -->
    <section class="tabla-section">

        <div th:if="${#lists.isEmpty(propiedades)}" class="sin-resultados">
            No se encontraron propiedades con los filtros aplicados.
        </div>

        <table th:unless="${#lists.isEmpty(propiedades)}" class="tabla">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Dirección</th>
                    <th>Ciudad</th>
                    <th>Tipo</th>
                    <th>Ambientes</th>
                    <th>m²</th>
                    <th>Estado</th>
                    <th>Propietario</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="prop : ${propiedades}">
                    <td th:text="${prop.id}"></td>
                    <td th:text="${prop.direccion}"></td>
                    <td th:text="${prop.ciudad}"></td>
                    <td th:text="${prop.tipo != null ? prop.tipo.name() : '-'}"></td>
                    <td th:text="${prop.cantAmbientes}"></td>
                    <td th:text="${prop.mtsCuadrados}"></td>
                    <td>
                        <span th:text="${prop.estadoDisp != null ? prop.estadoDisp.name() : '-'}"
                              th:classappend="${prop.estadoDisp?.name() == 'DISPONIBLE'} ? ' badge badge-activa'  :
                                             (${prop.estadoDisp?.name() == 'ALQUILADA'}  ? ' badge badge-pausada' :
                                             (${prop.estadoDisp?.name() == 'RESERVADA'}  ? ' badge badge-pausada' :
                                                                                            ' badge badge-finalizada'))">
                        </span>
                    </td>
                    <td th:text="${prop.propietario != null ? prop.propietario.getNombreCompleto() : '-'}"></td>
                    <td class="acciones">
                        <!-- HU 1.3 - Botón editar -->
                        <a th:href="@{/propiedades/editar/{id}(id=${prop.id})}"
                           class="btn btn-sm btn-warning">Editar</a>

                        <!-- HU 1.2 - Botón eliminar con confirmación -->
                        <form th:action="@{/propiedades/eliminar/{id}(id=${prop.id})}"
                              method="post"
                              style="display:inline;"
                              onsubmit="return confirm('¿Eliminar la propiedad #' + [[${prop.id}]] + '? Esta acción es una baja lógica y no se podrá deshacer desde aquí.');">
                            <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </section>

    <div class="page-footer">
        <a th:href="@{/}" class="btn btn-link">← Inicio</a>
    </div>

</div>
</body>
</html>
